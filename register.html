<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Oath - Criar Conta</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="register-page">

<div class="container">

    <h1>Criar Conta</h1>

    <div class="login-box">

        <input type="text"
               id="register-user"
               placeholder="Usuário">

        <input type="password"
               id="register-pass"
               placeholder="Senha">

        <select id="register-class">

            <option value="">Escolha sua Classe</option>

            <option>Warrior</option>

            <option>Mage</option>

            <option>Warlock</option>

            <option>Paladino</option>

            <option>Sacerdote</option>

            <option>Shaman</option>

            <option>Druida</option>

            <option>Hunter</option>

            <option>Rogue</option>

            <option>DK</option>

        </select>

        <button onclick="registrar()">

            Criar Conta

        </button>

        <button onclick="voltarLogin()">

            Voltar

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
